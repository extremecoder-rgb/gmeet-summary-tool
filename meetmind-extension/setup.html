<!DOCTYPE html>
<html>
<head>
    <title>MeetMind Setup</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .card {
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            max-width: 400px;
        }
        h1 { margin-bottom: 10px; color: #818cf8; }
        p { color: #94a3b8; line-height: 1.5; margin-bottom: 30px; }
        button {
            background: #6366f1;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.2s;
        }
        button:hover { background: #4f46e5; transform: translateY(-2px); }
        #status { margin-top: 20px; font-weight: 500; }
        .success { color: #22c55e; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Microphone Access</h1>
        <p>To record your own voice during meetings, we need your permission. Click the button below and select <strong>Allow</strong> when prompted.</p>
        <button id="grantBtn">Grant Permission</button>
        <div id="status"></div>
    </div>
    <script src="setup.js"></script>
</body>
</html>
